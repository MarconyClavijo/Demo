<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MarconyRadio.com | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
box-shadow:0 0 20px #ff0000;
}

.brand{
font-size:20px;
color:#fff;
font-weight:700;
}

.rightTop{
display:flex;
align-items:center;
gap:15px;
}

.social a{
color:white;
font-size:18px;
text-decoration:none;
margin-right:10px;
}

.appBtn{
background:#00cc66;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
color:white;
font-size:12px;
}

/* HERO */

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#000,#111);
position:relative;
}

/* FONDO ANIMADO */

.hero::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ff000022,transparent);
animation:bgMove 15s linear infinite;
}

@keyframes bgMove{
0%{transform:translate(-20%,-20%)}
50%{transform:translate(-10%,-10%)}
100%{transform:translate(-20%,-20%)}
}

/* PLAYER */

.player{
position:relative;
z-index:2;
background:#111;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px #000;
text-align:center;
max-width:450px;
}

/* LOGO */

.logo{
width:150px;
border-radius:50%;
box-shadow:0 0 20px red;
}

.spin{
animation:spin 8s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.playBtn{
background:red;
border:none;
padding:15px 35px;
border-radius:40px;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

/* VOLUMEN */

.volume{
margin-top:15px;
}

.volume input{
width:100%;
}

/* VISUALIZADOR */

.visualizer{
display:flex;
justify-content:center;
gap:4px;
margin-top:20px;
height:30px;
}

.visualizer span{
width:5px;
background:#00ffff;
animation:viz 1s infinite ease-in-out;
}

.visualizer span:nth-child(2){animation-delay:.1s}
.visualizer span:nth-child(3){animation-delay:.2s}
.visualizer span:nth-child(4){animation-delay:.3s}
.visualizer span:nth-child(5){animation-delay:.4s}

@keyframes viz{
0%,100%{height:5px}
50%{height:30px}
}

/* COVER */

.cover{
margin-top:20px;
width:200px;
height:200px;
border-radius:10px;
object-fit:cover;
}

/* HISTORIAL */

.history{
margin-top:20px;
font-size:13px;
text-align:left;
}

/* AUSPICIADORES SLIDER */

.sponsors{
background:#111;
padding:40px;
overflow:hidden;
}

.slider{
display:flex;
gap:50px;
animation:slide 20s linear infinite;
}

.slider img{
width:160px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.slider img:hover{
transform:scale(1.1);
}

@keyframes slide{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* MOBILE */

@media(max-width:600px){

header{
padding:10px 15px;
}

.player{
width:90%;
}

}

</style>
</head>

<body>

<header>

<div class="brand">MarconyRadio.com</div>

<div class="rightTop">

<div class="social">

<a href="https://www.facebook.com/radiomarcony" target="_blank">📘</a>

<a href="https://wa.me/51942883375" target="_blank">💬</a>

</div>

<a class="appBtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
DESCARGAR APP
</a>

</div>

</header>

<section class="hero">

<div class="player">

<img src="https://image2url.com/r2/default/images/1773073454712-7beae05c-bba6-4cbc-a169-e794356cf998.png" class="logo" id="logo">

<h2>MARCONY RADIO</h2>

<div id="status">Radio detenida</div>

<audio id="radio"></audio>

<button class="playBtn" id="btn" onclick="toggleRadio()">▶ ESCUCHAR</button>

<div class="volume">

🎛 Volumen  
<input type="range" min="0" max="1" step="0.01" value="1" onchange="radio.volume=this.value">

</div>

<div>
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<img id="cover" class="cover" src="https://via.placeholder.com/200">

<div class="visualizer">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="history">
<h4>Últimas canciones</h4>
<ul id="history"></ul>
</div>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

</div>

</section>

<section class="sponsors">

<div class="slider">

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

</div>

</section>

<script>

const radio=document.getElementById("radio")
const btn=document.getElementById("btn")
const status=document.getElementById("status")
const logo=document.getElementById("logo")

let playing=false
let history=[]

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream?"+Date.now()
radio.play()
playing=true

status.innerText="🔴 EN VIVO"
btn.innerText="DETENER"
logo.classList.add("spin")

}else{

radio.pause()
radio.src=""
playing=false

status.innerText="Radio detenida"
btn.innerText="▶ ESCUCHAR"
logo.classList.remove("spin")

}

}

setInterval(()=>{

let song=document.getElementById("sonic_title").innerText

if(song && !history.includes(song)){

history.unshift(song)

if(history.length>5)history.pop()

let html=""
history.forEach(s=>{

html+="<li>"+s+"</li>"

})

document.getElementById("history").innerHTML=html

buscarCover(song)

}

},4000)

function buscarCover(song){

let q=encodeURIComponent(song)

fetch("https://itunes.apple.com/search?term="+q+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length>0){

document.getElementById("cover").src=data.results[0].artworkUrl100.replace("100x100","400x400")

}

})

}

</script>

</body>
</html>
