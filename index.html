<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Stereo M 101.5 FM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins, sans-serif;
background:linear-gradient(180deg,#0088cc,#f44336);
color:white;
text-align:center;
}

header{
background:#ffd700;
color:#111;
padding:20px;
}

.logo{
width:120px;
animation:logo 3s infinite ease-in-out;
}

@keyframes logo{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.container{
max-width:500px;
margin:auto;
padding:30px 20px;
}

.player{
background:white;
color:black;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.live{
color:red;
font-weight:bold;
margin-top:10px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

button{
margin-top:20px;
background:#e60000;
border:none;
color:white;
padding:15px 25px;
font-size:18px;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#b80000;
}

.song{
margin-top:15px;
font-weight:bold;
}

.links{
margin-top:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.links a{
background:white;
color:#e60000;
padding:12px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:30px;
background:#222;
padding:15px;
font-size:14px;
}

</style>
</head>

<body>

<header>

<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png" class="logo">

<h2>Radio Stereo M 101.5 FM</h2>
<div>La Radio Papá 🎙️</div>

</header>

<div class="container">

<div class="player">

<h3>🎧 Escuchar en Vivo</h3>

<div class="live">🔴 EN VIVO</div>

<button id="playBtn">ESCUCHAR EN VIVO</button>

<div class="song">
<span id="songTitle">Cargando canción...</span>
</div>

<audio id="radio" playsinline preload="none"></audio>

</div>

<div class="links">

<a href="https://play.google.com/store/apps/details?id=com.innovatel.radiostereom" target="_blank">📲 Descargar App</a>

<a href="https://www.facebook.com/share/1Dib9eQUFD/" target="_blank">📘 Facebook</a>

<a href="https://wa.me/51984412853" target="_blank">🎤 WhatsApp Oyentes</a>

<a href="https://wa.me/51942883375" target="_blank">📢 Publicidad</a>

</div>

</div>

<footer>
Diseño web Marcony Clavijo | 942883375
</footer>

<script>

const btn = document.getElementById("playBtn");
const radio = document.getElementById("radio");

const stream = "https://sonic.globalstream.pro/8108/stream";

let playing = false;

btn.onclick = function(){

if(!playing){

radio.src = stream + "?t=" + new Date().getTime();

radio.play();

btn.innerText="DETENER";

playing=true;

}else{

radio.pause();
radio.src="";

btn.innerText="ESCUCHAR EN VIVO";

playing=false;

}

};

</script>

<script id="sonic_js" data-port="8108" src="https://sonic.globalstream.pro/cp/widgets.js?r=906"></script>

<script>

function updateSong(){

if(typeof sonic_data!=="undefined"){

if(sonic_data.songtitle){

document.getElementById("songTitle").innerText=sonic_data.songtitle;

}

}

}

setInterval(updateSong,2000);

</script>

</body>
</html>
