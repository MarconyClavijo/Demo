<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corporación Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f2f2f2;
text-align:center;
transition:.3s;
}

/* HEADER ORIGINAL */
.header{
padding:20px;
}

.header img{
width:320px;
max-width:90%;
animation:float 4s ease-in-out infinite;
filter:drop-shadow(0 0 20px rgba(255,120,0,.5));
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* GRID ORIGINAL */
.radios{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

/* CARD ORIGINAL */
.radio{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.15);
transition:.3s;
cursor:pointer;
}

.radio:hover{
transform:scale(1.05);
}

.radio-top{
height:130px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.radio-top img{
width:85px;
object-fit:contain;
}

/* PLAY */
.play{
position:absolute;
bottom:-25px;
background:linear-gradient(45deg,#ff00cc,#6a00ff);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

/* NAME */
.radio-name{
padding:35px 10px 15px;
font-weight:600;
}

/* ACTIVE */
.active{
box-shadow:0 0 25px #ff0000;
transform:scale(1.05);
}

/* PLAYER */
.player{
margin:25px;
}

audio{
width:300px;
}

/* MINI PLAYER */
#miniPlayer{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#111;
color:#fff;
padding:12px;
border-radius:15px;
z-index:9999;
font-weight:600;
}

/* DARK MODE */
.dark{
background:#121212;
color:white;
}

.dark .radio{
background:#1f1f1f;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="https://imgfz.com/i/eR5Xw2K.png">
</div>

<!-- RADIOS -->
<div class="radios">

<!-- STEREO M -->
<div class="radio" id="r1"
onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','r1')">
<div class="radio-top" style="background:#ffd400">
<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">
<div class="play">▶</div>
</div>
<div class="radio-name">Stereo M</div>
</div>

<!-- LA PATRONA (FIX LOGO) -->
<div class="radio" id="r2"
onclick="playRadio('https://radiostreaming.pro/8310/stream','Radio La Patrona','r2')">
<div class="radio-top" style="background:#ff2e8a">
<img src="https://image2url.com/r2/default/images/1773782144520-db83b536-4765-45ec-b761-f51c5ee811ed.png">
<div class="play">▶</div>
</div>
<div class="radio-name">Radio La Patrona</div>
</div>

<!-- LA TREMENDA -->
<div class="radio" id="r3"
onclick="playRadio('https://radiostreaming.pro/8238/stream','La Tremenda','r3')">
<div class="radio-top" style="background:#ff3d00">
<img src="https://imgfz.com/i/h7TrEm5.png">
<div class="play">▶</div>
</div>
<div class="radio-name">La Tremenda</div>
</div>

<!-- STEREO L -->
<div class="radio" id="r4"
onclick="playRadio('https://radiostreaming.pro/8234/stream','Stereo L','r4')">
<div class="radio-top" style="background:#0f8f73">
<img src="https://imgfz.com/i/pFgX2fl.png">
<div class="play">▶</div>
</div>
<div class="radio-name">Stereo L</div>
</div>

</div>

<!-- PLAYER -->
<div class="player">
<h3 id="title">Selecciona una radio</h3>
<audio id="audio" controls></audio>
</div>

<!-- MINI PLAYER -->
<div id="miniPlayer">
🎧 <span id="miniText">Ninguna radio activa</span>
</div>

<script>

let current=null;

function playRadio(url,name,id){

const audio=document.getElementById("audio");

if(current===id){
audio.pause();
audio.src="";
current=null;
document.getElementById("miniText").innerText="Ninguna radio activa";
document.getElementById("title").innerText="Selecciona una radio";
document.getElementById(id).classList.remove("active");
return;
}

audio.pause();
audio.src=url;
audio.load();

audio.play().catch(e=>{
console.log("error audio",e);
});

current=id;

document.querySelectorAll(".radio").forEach(r=>r.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.getElementById("title").innerText="🔴 En vivo: "+name;
document.getElementById("miniText").innerText=name;

}

</script>

</body>
</html>
