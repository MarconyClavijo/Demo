<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio - En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0d0d0d;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
width:95%;
max-width:700px;
text-align:center;
padding:20px;
}

/* LOGOS */
.logo{
width:150px;
border-radius:50%;
box-shadow:0 0 25px #ff004c;
margin-bottom:15px;
transition:transform .5s;
}
.logo:hover{transform:scale(1.05)}

.logoText{
width:300px;
margin-bottom:20px;
}

/* TITULOS */
h1{
margin:10px 0;
font-size:34px;
font-family:'Orbitron',sans-serif;
color:#ffcc00;
text-shadow:0 0 15px #ff004c;
}

.sub{
font-size:15px;
color:#00ffff;
letter-spacing:2px;
margin-bottom:25px;
}

/* BOTON */
.playBtn{
background:#ff004c;
border:none;
padding:16px 45px;
font-size:18px;
border-radius:40px;
color:white;
cursor:pointer;
box-shadow:0 0 25px #ff004c;
transition:.3s;
font-family:'Orbitron',sans-serif;
}
.playBtn:hover{transform:scale(1.08)}

.status{
margin-top:15px;
font-size:16px;
color:#00ffff;
}

/* CANCION */
.song{
margin-top:10px;
font-size:17px;
color:#ffcc00;
}

/* PORTADA */
.cover{
margin-top:20px;
width:240px;
height:240px;
border-radius:12px;
object-fit:cover;
box-shadow:0 0 25px #000;
}

/* HISTORIAL */
.history{
margin-top:25px;
font-size:14px;
text-align:left;
background:#111;
padding:12px;
border-radius:8px;
}
.history h3{
font-size:15px;
margin-bottom:8px;
color:#00ffff;
font-family:'Orbitron',sans-serif;
}
.history ul{list-style:none;padding:0;margin:0}
.history li{margin-bottom:5px;opacity:.85}

/* ECUALIZADOR */
.eq{
display:flex;
justify-content:center;
gap:5px;
margin-top:20px;
height:20px;
}
.eq span{
width:6px;
background:#00ffff;
animation:eq 1s infinite ease-in-out;
}
.eq span:nth-child(2){animation-delay:.2s}
.eq span:nth-child(3){animation-delay:.4s}
.eq span:nth-child(4){animation-delay:.6s}
.eq span:nth-child(5){animation-delay:.8s}
@keyframes eq{0%,100%{height:5px}50%{height:20px}}

/* REDES */
.social{margin-top:25px}
.social a{
display:inline-block;
margin:5px;
padding:10px 20px;
border-radius:25px;
text-decoration:none;
color:white;
font-size:14px;
transition:.3s;
font-family:'Orbitron',sans-serif;
}
.fb{background:#1877f2}
.wa{background:#25d366}
.app{background:#ffcc00;color:#000}
.social a:hover{opacity:.8}

/* AUSPICIADORES */
.sponsors{
margin-top:35px;
}
.sponsors h3{
color:#ffcc00;
margin-bottom:15px;
font-family:'Orbitron',sans-serif;
}
.sponsors a img{
width:130px;
margin:10px;
border-radius:10px;
box-shadow:0 0 15px #333;
transition:.3s;
}
.sponsors a img:hover{transform:scale(1.1)}

/* FOOTER */
footer{
margin-top:40px;
font-size:12px;
opacity:.6;
}
</style>
</head>

<body>
<div class="container">

<img src="https://image2url.com/r2/default/images/1773073454712-7beae05c-bba6-4cbc-a169-e794356cf998.png" class="logo" id="logo">
<img src="https://image2url.com/r2/default/images/1773073582797-5c7bb2aa-125b-466e-8fe1-13def1cfa011.png" class="logoText">

<h1>MARCONY RADIO</h1>
<div class="sub">TRANSMITIENDO EN VIVO 24/7</div>

<audio id="radio"></audio>
<button class="playBtn" id="btn" onclick="toggleRadio()">▶ ESCUCHAR EN VIVO</button>
<div class="status" id="status">Radio detenida</div>

<div class="song">🎵 <span id="sonic_title">Cargando canción...</span></div>
<img id="cover" class="cover" src="https://via.placeholder.com/240x240?text=Marcony+Radio">

<div class="eq" id="eq" style="display:none">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="history">
<h3>Últimas canciones</h3>
<ul id="history"></ul>
</div>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<div class="social">
<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">Facebook</a>
<a class="wa" href="https://wa.me/51942883375" target="_blank">WhatsApp</a>
<a class="app" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">📱 Descargar App</a>
</div>

<div class="sponsors">
<h3>Auspiciadores</h3>
<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png" alt="El Tio Jhony">
</a>
<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png" alt="Childrens College">
</a>
</div>

<footer>
Página creada por Marcony Clavijo © 2026
</footer>

</div>

<script>
const radio=document.getElementById("radio")
const btn=document.getElementById("btn")
const status=document.getElementById("status")
const logo=document.getElementById("logo")
const eq=document.getElementById("eq")

let playing=false
let history=[]

function toggleRadio(){
if(!playing){
radio.src="https://radiostreaming.pro/8216/stream?"+Date.now()
radio.play()
playing=true
}else{
radio.pause()
radio.src=""
playing=false
status.innerText="Radio detenida"
btn.innerText="▶ ESCUCHAR EN VIVO"
logo.classList.remove("spin")
eq.style.display="none"
}
}

radio.addEventListener("play",()=>{
status.innerText="🔴 EN VIVO"
btn.innerText="⏹ DETENER"
logo.classList.add("spin")
eq.style.display="flex"
})

setInterval(()=>{
let song=document.getElementById("sonic_title").innerText
if(song && !history.includes(song)){
history.unshift(song)
if(history.length>5)history.pop()
let html=""
history.forEach(s=>{html+="<li>"+s+"</li>"})
document.getElementById("history").innerHTML=html
buscarCover(song)
}
},4000)

function buscarCover(song){
let q=encodeURIComponent(song)
