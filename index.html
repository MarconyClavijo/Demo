<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio La N 96.3 FM | Suena Diferente</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#000,#111,#ffcc00);
color:#fff;
text-align:center;
}

header{
padding:40px 15px 20px;
}

.logo{
width:190px;
margin-bottom:12px;
filter:drop-shadow(0 0 4px #fff) drop-shadow(0 0 12px #ffcc00);
animation:floatLogo 3.5s ease-in-out infinite;
}

@keyframes floatLogo{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

h1{
margin:6px 0 4px;
font-size:26px;
}

.slogan{
color:#ffcc00;
letter-spacing:2px;
font-size:14px;
margin-bottom:25px;
}

.player-box{
margin:40px 0;
}

.play-btn{
background:#ffcc00;
color:#000;
border:none;
padding:18px 50px;
font-size:20px;
font-weight:700;
border-radius:50px;
cursor:pointer;
box-shadow:0 0 25px rgba(255,204,0,.8);
}

.live-indicator{
margin-top:15px;
font-size:14px;
display:none;
}

.live-dot{
height:10px;
width:10px;
background:red;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.song-title{
margin-top:25px;
font-size:16px;
color:#ffcc00;
}

.buttons{
margin:30px 0;
}

.buttons a{
display:inline-block;
margin:6px;
padding:12px 22px;
background:#111;
color:#ffcc00;
border:2px solid #ffcc00;
font-weight:600;
text-decoration:none;
border-radius:30px;
}

footer{
margin-top:35px;
padding:15px;
font-size:13px;
background:rgba(0,0,0,.55);
}
</style>
</head>

<body>

<header>

<img src="https://user1472.na.imgto.link/public/20260117/la-n-removebg-preview.avif" class="logo">

<h1>Radio La N 96.3 FM</h1>
<div class="slogan">SUENA DIFERENTE</div>

</header>

<div class="player-box">

<button class="play-btn" id="playButton">▶ ESCUCHAR EN VIVO</button>

<div class="live-indicator" id="liveIndicator">
<span class="live-dot"></span> EN VIVO
</div>

<div class="song-title">
🎵 <span id="songtitle">Transmitiendo...</span>
</div>

</div>

<div class="buttons">
<a href="#">📘 Facebook</a>
<a href="https://wa.me/51999999999">📞 WhatsApp</a>
</div>

<footer>
© 2026 Radio La N 96.3 FM · Diseño web: Marcony Clavijo
</footer>

<script>

const streamURL="https://radiostreaming.pro/8222/stream";
const button=document.getElementById("playButton");
const liveIndicator=document.getElementById("liveIndicator");

let audio=new Audio(streamURL);
let isPlaying=false;

button.onclick=function(){

if(!isPlaying){

audio.play();
isPlaying=true;
button.textContent="■ DETENER";
liveIndicator.style.display="block";

}else{

audio.pause();
isPlaying=false;
button.textContent="▶ ESCUCHAR EN VIVO";
liveIndicator.style.display="none";

}

};

audio.addEventListener("loadedmetadata",function(){

if(audio.metadata && audio.metadata.title){
document.getElementById("songtitle").innerText=audio.metadata.title;
}

});

</script>

</body>
</html>
