<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 25px;
background:#000;
border-bottom:1px solid #222;
}

.header-logo{
height:70px;
filter:drop-shadow(0 0 8px rgba(0,0,0,0.6));
}

.appbtn{
background:#ff0033;
padding:10px 18px;
border-radius:25px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* HERO */

.hero{

background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4")
center/cover no-repeat;

height:360px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

/* PLAYER */

.player{
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.6);
margin-top:20px;
}

audio{
width:260px;
}

/* SPONSORS */

.sponsors{
background:#ffffff;
padding:15px 10px;
text-align:center;
overflow:hidden;
}

.sponsors h3{
color:#111;
font-size:18px;
margin-bottom:10px;
}

.sponsor-track{
display:flex;
gap:50px;
width:max-content;
animation:scroll 25s linear infinite;
}

.sponsor-track img{
height:45px;
width:auto;
opacity:0.9;
transition:.3s;
}

.sponsor-track img:hover{
opacity:1;
transform:scale(1.05);
}

@keyframes scroll{

0%{transform:translateX(0)}

100%{transform:translateX(-50%)}

}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
background:#000;
border-top:1px solid #222;
}

.socials a{
margin:0 10px;
color:white;
text-decoration:none;
font-size:18px;
}

/* MOBILE */

@media(max-width:768px){

header{
flex-direction:column;
gap:10px;
}

.header-logo{
height:60px;
}

.hero{
height:auto;
padding:40px 20px;
}

.player{
margin-top:20px;
}

}

</style>
</head>

<body>

<header>

<img class="header-logo" src="https://image2url.com/r2/default/images/1773037946056-a151a866-7199-4082-8a26-038f5e9ca31c.png">

<a class="appbtn" href="#">Descargar<br>Nuestra App</a>

</header>

<section class="hero">

<h2>🎵 Escucha en Vivo</h2>

<div class="player">

<audio controls autoplay>

<source src="TU_STREAM_AQUI" type="audio/mpeg">

</audio>

</div>

</section>

<section class="sponsors">

<h3>Auspiciado por:</h3>

<div style="overflow:hidden">

<div class="sponsor-track">

<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+1">
<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+2">
<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+3">
<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+4">

<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+1">
<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+2">
<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+3">
<img src="https://dummyimage.com/180x80/000/fff&text=Sponsor+4">

</div>

</div>

</section>

<div class="footer">

<div class="socials">

<a href="#">Facebook</a>
<a href="#">Instagram</a>
<a href="#">WhatsApp</a>

</div>

<p>Visitas: 000123</p>

</div>

</body>
</html>
