<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(180deg,#000,#0a0a0a,#111);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
width:95%;
max-width:420px;
}

/* LOGO */

.logo{
width:170px;
border-radius:50%;
box-shadow:0 0 30px #ff0055;
margin-bottom:10px;
}

.spin{
animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* TITULOS */

h1{
margin:5px 0;
font-size:28px;
}

.sub{
font-size:12px;
color:#00ffff;
letter-spacing:2px;
margin-bottom:20px;
}

/* BOTON */

.playBtn{
background:#ff0033;
border:none;
padding:15px 35px;
font-size:18px;
border-radius:40px;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff0033;
transition:.3s;
}

.playBtn:hover{
transform:scale(1.05);
}

.status{
margin-top:10px;
font-size:13px;
color:#00ffcc;
}

/* CANCION */

.song{
margin-top:12px;
font-size:15px;
color:#ffd000;
}

/* COVER */

.cover{
margin-top:18px;
width:200px;
height:200px;
border-radius:10px;
object-fit:cover;
box-shadow:0 0 20px #000;
}

/* ECUALIZADOR */

.eq{
display:flex;
justify-content:center;
gap:4px;
margin-top:18px;
height:20px;
}

.eq span{
width:4px;
background:#00ffff;
animation:eq 1s infinite ease-in-out;
}

.eq span:nth-child(2){animation-delay:.2s}
.eq span:nth-child(3){animation-delay:.4s}
.eq span:nth-child(4){animation-delay:.6s}
.eq span:nth-child(5){animation-delay:.8s}

@keyframes eq{
0%,100%{height:5px}
50%{height:20px}
}

/* HISTORIAL */

.history{
margin-top:20px;
font-size:13px;
text-align:left;
}

.history h3{
font-size:14px;
color:#00ffff;
}

.history ul{
list-style:none;
padding:0;
}

.history li{
opacity:.8;
margin-bottom:3px;
}

/* AUSPICIADOR */

.sponsor{
margin-top:25px;
}

.sponsor img{
width:220px;
border-radius:10px;
box-shadow:0 0 20px #000;
transition:.3s;
}

.sponsor img:hover{
transform:scale(1.05);
}

/* APP */

.app{
margin-top:25px;
}

.app a{
background:#00c853;
color:white;
padding:12px 20px;
border-radius:30px;
text-decoration:none;
font-size:14px;
box-shadow:0 0 15px #00c853;
}

/* REDES */

.social{
margin-top:25px;
}

.social a{
display:inline-block;
margin:5px;
padding:8px 18px;
border-radius:25px;
text-decoration:none;
color:white;
font-size:13px;
}

.fb{background:#1877f2}
.wa{background:#25d366}

footer{
margin-top:25px;
font-size:11px;
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png" class="logo" id="logo">

<h1>MARCONY RADIO</h1>

<div class="sub">TRANSMITIENDO EN VIVO 24/7</div>

<audio id="radio"></audio>

<button class="playBtn" id="btn" onclick="toggleRadio()">▶ ESCUCHAR EN VIVO</button>

<div class="status" id="status">Radio detenida</div>

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<img id="cover" class="cover" src="https://via.placeholder.com/200x200?text=Marcony+Radio">

<div class="eq" id="eq" style="display:none">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="history">
<h3>Últimas canciones</h3>
<ul id="history"></ul>
</div>

<!-- AUSPICIADOR -->

<div class="sponsor">

<h3>Auspicia</h3>

<a href="https://instasize.com/p/cc4e29c5bea0755ba0111ea8e96b6cbd4df2e07f7665f90be61928ace1b2689e" target="_blank">

<img src="https://instasize.com/p/cc4e29c5bea0755ba0111ea8e96b6cbd4df2e07f7665f90be61928ace1b2689e">

</a>

</div>

<!-- APP -->

<div class="app">

<p>📲 Descarga nuestra aplicación</p>

<a href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
DESCARGAR APP ANDROID
</a>

</div>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<div class="social">
<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">Facebook</a>
<a class="wa" href="https://wa.me/51942883375" target="_blank">WhatsApp</a>
</div>

<footer>
Marcony Radio © 2026
</footer>

</div>

<script>

const radio=document.getElementById("radio")
const btn=document.getElementById("btn")
const status=document.getElementById("status")
const logo=document.getElementById("logo")
const eq=document.getElementById("eq")

let playing=false
let history=[]

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream?"+Date.now()
radio.play()
playing=true

}else{

radio.pause()
radio.src=""
playing=false

status.innerText="Radio detenida"
btn.innerText="▶ ESCUCHAR EN VIVO"
logo.classList.remove("spin")
eq.style.display="none"

}

}

radio.addEventListener("play",()=>{

status.innerText="🔴 EN VIVO"
btn.innerText="⏹ DETENER"
logo.classList.add("spin")
eq.style.display="flex"

})

setInterval(()=>{

let song=document.getElementById("sonic_title").innerText

if(song && !history.includes(song)){

history.unshift(song)

if(history.length>5)history.pop()

let html=""

history.forEach(s=>{
html+="<li>"+s+"</li>"
})

document.getElementById("history").innerHTML=html

buscarCover(song)

}

},4000)

function buscarCover(song){

let q=encodeURIComponent(song)

fetch("https://itunes.apple.com/search?term="+q+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length>0){

document.getElementById("cover").src=data.results[0].artworkUrl100.replace("100x100","300x300")

}

})

}

</script>

</body>
</html>
