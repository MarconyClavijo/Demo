<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MarconyRadio.com | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
}

.brand{
display:flex;
align-items:center;
gap:15px;
}

.brand img{
height:50px;
}

.brand span{
font-size:22px;
font-weight:800;
}

.topRight{
display:flex;
align-items:center;
gap:20px;
}

.topRight a{
color:white;
text-decoration:none;
font-size:14px;
}

.appBtn{
background:#ff0000;
padding:10px 20px;
border-radius:30px;
}

/* HERO */

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(5px);
}

/* PLAYER */

.player{
display:flex;
gap:40px;
align-items:center;
z-index:2;
}

/* COVER */

.cover{
width:250px;
height:250px;
border-radius:15px;
object-fit:cover;
box-shadow:0 0 30px black;
}

/* INFO */

.info h1{
font-size:38px;
margin:0;
}

.song{
font-size:20px;
color:#ffcc00;
margin-top:10px;
}

/* PLAY */

.playBtn{
margin-top:20px;
background:white;
border:none;
padding:15px 35px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

/* VOLUMEN */

.volume{
margin-top:10px;
}

/* VISUALIZER */

.visualizer{
display:flex;
gap:4px;
margin-top:20px;
height:40px;
}

.visualizer span{
width:6px;
background:white;
animation:bars 1s infinite;
}

.visualizer span:nth-child(2){animation-delay:.2s}
.visualizer span:nth-child(3){animation-delay:.3s}
.visualizer span:nth-child(4){animation-delay:.4s}
.visualizer span:nth-child(5){animation-delay:.5s}

@keyframes bars{
0%,100%{height:10px}
50%{height:40px}
}

/* REDES */

.social{
margin-top:15px;
}

.social a{
margin-right:10px;
font-size:20px;
}

/* AUSPICIADORES */

.sponsors{
background:#111;
padding:40px;
text-align:center;
}

.sponsors h2{
margin-bottom:30px;
}

.sponsorGrid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.sponsorGrid img{
width:180px;
border-radius:10px;
transition:.3s;
}

.sponsorGrid img:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

footer{
background:black;
padding:20px;
text-align:center;
font-size:12px;
opacity:.6;
}

@media(max-width:900px){

.player{
flex-direction:column;
text-align:center;
}

.cover{
width:200px;
height:200px;
}

}

</style>
</head>

<body>

<header>

<div class="brand">

<img src="https://image2url.com/r2/default/images/1773073582797-5c7bb2aa-125b-466e-8fe1-13def1cfa011.png">

<span>MarconyRadio.com</span>

</div>

<div class="topRight">

<a href="https://www.facebook.com/radiomarcony">Facebook</a>

<a href="https://wa.me/51942883375">WhatsApp</a>

<a class="appBtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio">DESCARGAR APP</a>

</div>

</header>

<section class="hero">

<div class="player">

<img id="cover" class="cover" src="https://via.placeholder.com/250">

<div class="info">

<h1>🔴 EN VIVO</h1>

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<audio id="radio"></audio>

<button class="playBtn" onclick="toggleRadio()" id="btn">
▶ ESCUCHAR
</button>

<div class="volume">
🔊
<input type="range" min="0" max="1" step="0.01"
oninput="radio.volume=this.value">
</div>

<div class="visualizer">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="social">

<a href="https://www.facebook.com/radiomarcony">📘</a>

<a href="https://wa.me/51942883375">💬</a>

</div>

</div>

</div>

<script id="sonic_js" data-port="8216"
src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

</section>

<section class="sponsors">

<h2>AUSPICIADORES</h2>

<div class="sponsorGrid">

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

</div>

</section>

<footer>

© 2026 Marcony Radio

</footer>

<script>

const radio=document.getElementById("radio")
const btn=document.getElementById("btn")

let playing=false

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream"
radio.play()
btn.innerText="PAUSAR"
playing=true

}else{

radio.pause()
btn.innerText="▶ ESCUCHAR"
playing=false

}

}

/* COVER AUTOMATICO */

setInterval(()=>{

let song=document.getElementById("sonic_title").innerText

buscarCover(song)

},5000)

function buscarCover(song){

let q=encodeURIComponent(song)

fetch("https://itunes.apple.com/search?term="+q+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length>0){

document.getElementById("cover").src=data.results[0].artworkUrl100.replace("100x100","400x400")

}

})

}

</script>

</body>
</html>
