<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
box-shadow:0 0 20px #000;
}

.logoTop{
height:50px;
}

.topRight{
display:flex;
align-items:center;
gap:20px;
}

.topRight a{
color:white;
text-decoration:none;
font-size:14px;
}

.appBtn{
background:#ff0000;
padding:10px 20px;
border-radius:30px;
}

/* HERO */

.hero{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4") center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.8);
}

/* PLAYER */

.player{
z-index:2;
display:flex;
gap:40px;
align-items:center;
background:#111;
padding:30px;
border-radius:15px;
box-shadow:0 0 40px #000;
}

/* COVER */

.cover{
width:220px;
height:220px;
border-radius:10px;
object-fit:cover;
}

/* INFO */

.song{
font-size:18px;
margin-bottom:10px;
color:#ffcc00;
}

.status{
color:#00ffcc;
margin-bottom:10px;
}

/* BUTTON */

.playBtn{
background:white;
border:none;
padding:14px 30px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

/* VOLUMEN */

.volume{
margin-top:10px;
}

/* VISUALIZER */

.visualizer{
display:flex;
gap:4px;
margin-top:20px;
height:35px;
}

.visualizer span{
width:6px;
background:#00ffff;
animation:bars 1s infinite;
}

.visualizer span:nth-child(2){animation-delay:.2s}
.visualizer span:nth-child(3){animation-delay:.3s}
.visualizer span:nth-child(4){animation-delay:.4s}

@keyframes bars{
0%,100%{height:10px}
50%{height:35px}
}

/* ESTADISTICAS */

.stats{
margin-top:10px;
font-size:14px;
}

/* HISTORIAL */

.history{
background:#111;
padding:30px;
text-align:center;
}

.history ul{
list-style:none;
padding:0;
max-width:400px;
margin:auto;
}

.history li{
padding:6px;
border-bottom:1px solid #333;
font-size:13px;
}

/* AUSPICIADORES */

.sponsors{
background:#0d0d0d;
padding:40px;
text-align:center;
}

.sponsorGrid{
display:flex;
justify-content:center;
gap:80px;
flex-wrap:wrap;
margin-top:20px;
}

.sponsorGrid img{
width:200px;
transition:.3s;
}

.sponsorGrid img:hover{
transform:scale(1.1);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:black;
font-size:12px;
opacity:.7;
}

/* MOBILE */

@media(max-width:900px){

.player{
flex-direction:column;
text-align:center;
}

.cover{
width:180px;
height:180px;
}

}

</style>
</head>

<body>

<header>

<img class="logoTop" src="https://image2url.com/r2/default/images/1773073582797-5c7bb2aa-125b-466e-8fe1-13def1cfa011.png">

<div class="topRight">

<a href="https://www.facebook.com/radiomarcony">Facebook</a>

<a href="https://wa.me/51942883375">WhatsApp</a>

<a class="appBtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio">
DESCARGAR APP
</a>

</div>

</header>

<section class="hero">

<div class="player">

<img id="cover" class="cover" src="https://via.placeholder.com/200">

<div>

<div class="status">🔴 EN VIVO</div>

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<audio id="radio"></audio>

<button class="playBtn" onclick="toggleRadio()" id="btn">
▶ ESCUCHAR
</button>

<div class="volume">
🔊
<input type="range" min="0" max="1" step="0.01"
oninput="radio.volume=this.value">
</div>

<div class="visualizer">
<span></span><span></span><span></span><span></span>
</div>

<div class="stats">

👥 Oyentes: <span id="listeners">0</span>

</div>

</div>

</div>

<script id="sonic_js" data-port="8216"
src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

</section>

<section class="history">

<h2>Últimas canciones</h2>

<ul id="history"></ul>

</section>

<section class="sponsors">

<h2>Auspiciadores</h2>

<div class="sponsorGrid">

<a href="https://www.facebook.com/eltiojhony">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

</div>

</section>

<footer>

© 2026 Marcony Radio

</footer>

<script>

const radio=document.getElementById("radio")
const btn=document.getElementById("btn")
let playing=false

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream"
radio.play()
btn.innerText="PAUSAR"
playing=true

}else{

radio.pause()
btn.innerText="▶ ESCUCHAR"
playing=false

}

}

/* HISTORIAL */

let history=[]

setInterval(()=>{

let song=document.getElementById("sonic_title").innerText

if(song && !history.includes(song)){

history.unshift(song)

if(history.length>6)history.pop()

let html=""

history.forEach(s=>{

html+="<li>"+s+"</li>"

})

document.getElementById("history").innerHTML=html

buscarCover(song)

}

},4000)

/* COVER */

function buscarCover(song){

let q=encodeURIComponent(song)

fetch("https://itunes.apple.com/search?term="+q+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length>0){

document.getElementById("cover").src=data.results[0].artworkUrl100.replace("100x100","400x400")

}

})

}

/* OYENTES */

setInterval(()=>{

fetch("https://radiostreaming.pro/api/nowplaying/8216")

.then(r=>r.json())

.then(data=>{

document.getElementById("listeners").innerText=data.listeners.current

})

},10000)

</script>

</body>
</html>
