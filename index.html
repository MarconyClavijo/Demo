<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corporación Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f2f2f2;
text-align:center;
transition:.3s;
}

/* HEADER */
.header{
padding:20px;
}

.header img{
width:320px;
max-width:90%;
animation:float 4s ease-in-out infinite;
filter:drop-shadow(0 0 20px rgba(255,120,0,.5));
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* GRID BONITO */
.radios{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

/* CARD PRO */
.radio{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.15);
transition:.3s;
cursor:pointer;
padding:10px;
}

.radio:hover{
transform:scale(1.05);
}

.radio img{
width:80px;
height:80px;
object-fit:contain;
}

.radio-name{
margin-top:5px;
font-weight:600;
}

.play{
font-size:22px;
margin-top:5px;
color:#ff004c;
}

.active{
box-shadow:0 0 20px #ff004c;
transform:scale(1.05);
}

/* PLAYER */
.player{
margin:20px;
}

audio{
width:90%;
}

/* MINI PLAYER */
#mini{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#111;
color:#fff;
padding:12px;
border-radius:12px;
font-weight:bold;
}

/* DARK MODE */
.dark{
background:#111;
color:#fff;
}

.dark .radio{
background:#1e1e1e;
color:#fff;
}

</style>
</head>

<body>

<div class="header">
<img src="https://imgfz.com/i/eR5Xw2K.png">
</div>

<div class="radios">

<div class="radio" id="r1" onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','r1')">
<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">
<div class="radio-name">Stereo M</div>
<div class="play">▶</div>
</div>

<div class="radio" id="r2" onclick="playRadio('https://radiostreaming.pro/8310/stream','La Patrona','r2')">
<img src="https://image2url.com/r2/default/images/1773782144520.png">
<div class="radio-name">La Patrona</div>
<div class="play">▶</div>
</div>

<div class="radio" id="r3" onclick="playRadio('https://radiostreaming.pro/8238/stream','La Tremenda','r3')">
<img src="https://imgfz.com/i/h7TrEm5.png">
<div class="radio-name">La Tremenda</div>
<div class="play">▶</div>
</div>

<div class="radio" id="r4" onclick="playRadio('https://radiostreaming.pro/8234/stream','Stereo L','r4')">
<img src="https://imgfz.com/i/pFgX2fl.png">
<div class="radio-name">Stereo L</div>
<div class="play">▶</div>
</div>

</div>

<div class="player">
<h3 id="title">Selecciona una radio</h3>
<audio id="audio" controls></audio>
</div>

<div id="mini">🎧 Ninguna radio activa</div>

<script>

let current = null;

function playRadio(url,name,id){

const audio = document.getElementById("audio");
const title = document.getElementById("title");

if(current === id){
audio.pause();
audio.src = "";
current = null;
title.innerText = "Selecciona una radio";
document.getElementById("mini").innerText = "🎧 Ninguna radio activa";
document.getElementById(id).classList.remove("active");
return;
}

audio.pause();
audio.src = url;
audio.load();

audio.play().catch(e=>{
console.log("Autoplay bloqueado", e);
});

current = id;

document.querySelectorAll(".radio").forEach(r=>r.classList.remove("active"));
document.getElementById(id).classList.add("active");

title.innerText = "🔴 En vivo: " + name;
document.getElementById("mini").innerText = "🎧 " + name;

}

</script>

</body>
</html>
