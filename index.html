<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corporación Marcony | Radios en Vivo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f2f2f2;
text-align:center;
transition:.3s;
}

/* HEADER */
.header img{
width:300px;
max-width:90%;
margin-top:15px;
}

/* GRID */
.radios{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
max-width:900px;
margin:auto;
}

.radio{
background:#fff;
border-radius:15px;
padding:10px;
cursor:pointer;
transition:.2s;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.radio:hover{transform:scale(1.03);}
.active{box-shadow:0 0 15px red;}

.radio img{
width:80px;
height:80px;
object-fit:contain;
}

.play{
font-size:20px;
margin-top:5px;
}

/* PLAYER */
.player{
margin:15px;
}

audio{
width:90%;
}

/* MINI PLAYER */
#mini{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#111;
color:#fff;
padding:10px;
border-radius:12px;
}

/* DARK */
.dark{
background:#111;
color:#fff;
}

.dark .radio{
background:#1f1f1f;
color:#fff;
}

</style>
</head>

<body>

<div class="header">
<img src="https://imgfz.com/i/eR5Xw2K.png">
</div>

<div class="radios">

<div class="radio" onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','r1')" id="r1">
<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">
<div>Stereo M</div>
<div class="play">▶</div>
</div>

<div class="radio" onclick="playRadio('https://radiostreaming.pro/8310/stream','La Patrona','r2')" id="r2">
<img src="https://image2url.com/r2/default/images/1773782144520-db83b536.png">
<div>La Patrona</div>
<div class="play">▶</div>
</div>

<div class="radio" onclick="playRadio('https://radiostreaming.pro/8238/stream','La Tremenda','r3')" id="r3">
<img src="https://imgfz.com/i/h7TrEm5.png">
<div>La Tremenda</div>
<div class="play">▶</div>
</div>

<div class="radio" onclick="playRadio('https://radiostreaming.pro/8234/stream','Stereo L','r4')" id="r4">
<img src="https://imgfz.com/i/pFgX2fl.png">
<div>Stereo L</div>
<div class="play">▶</div>
</div>

</div>

<div class="player">
<h3 id="title">Selecciona una radio</h3>
<audio id="audio" controls></audio>
</div>

<div id="mini">🎧 Ninguna radio activa</div>

<script>

let current = null;

function playRadio(url,name,id){

const audio = document.getElementById("audio");
const title = document.getElementById("title");

if(current === id){
audio.pause();
audio.src = "";
current = null;
title.innerText = "Selecciona una radio";
document.getElementById("mini").innerText = "🎧 Ninguna radio activa";
document.getElementById(id).classList.remove("active");
return;
}

audio.pause();
audio.src = url;
audio.load();

audio.play().catch(e=>{
console.log("Autoplay bloqueado",e);
});

current = id;

document.querySelectorAll(".radio").forEach(r=>r.classList.remove("active"));
document.getElementById(id).classList.add("active");

title.innerText = "🔴 En vivo: " + name;
document.getElementById("mini").innerText = "🎧 " + name;
}

</script>

</body>
</html>
