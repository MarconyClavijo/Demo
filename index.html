<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
text-align:center;
}

/* HEADER */

header{
background:#000;
padding:20px;
box-shadow:0 0 20px #ff0000;
}

.logoText{
width:280px;
}

/* PLAYER */

.hero{
background:url("https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f") center/cover no-repeat;
padding:80px 20px;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.75);
}

.player{
position:relative;
z-index:2;
max-width:500px;
margin:auto;
background:#111;
padding:40px;
border-radius:15px;
box-shadow:0 0 30px #000;
}

/* LOGO */

.logo{
width:160px;
border-radius:50%;
box-shadow:0 0 25px #ff0000;
}

.spin{
animation:spin 8s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

h1{
margin:15px 0 5px;
}

.status{
color:#00ffff;
margin-bottom:10px;
}

/* BOTON */

.playBtn{
background:#ff0000;
border:none;
padding:15px 35px;
border-radius:40px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff0000;
transition:.3s;
}

.playBtn:hover{
transform:scale(1.1);
}

/* CANCION */

.song{
margin-top:10px;
color:#ffcc00;
}

/* COVER */

.cover{
margin-top:20px;
width:200px;
height:200px;
border-radius:10px;
object-fit:cover;
box-shadow:0 0 20px #000;
}

/* ECUALIZADOR */

.eq{
display:flex;
justify-content:center;
gap:5px;
margin-top:20px;
height:25px;
}

.eq span{
width:5px;
background:#00ffff;
animation:eq 1s infinite;
}

.eq span:nth-child(2){animation-delay:.2s}
.eq span:nth-child(3){animation-delay:.4s}
.eq span:nth-child(4){animation-delay:.6s}
.eq span:nth-child(5){animation-delay:.8s}

@keyframes eq{
0%,100%{height:5px}
50%{height:25px}
}

/* HISTORIAL */

.history{
margin-top:25px;
text-align:left;
font-size:13px;
}

.history ul{
list-style:none;
padding:0;
}

/* AUSPICIADORES */

.sponsors{
background:#111;
padding:50px 20px;
}

.sponsors h2{
margin-bottom:30px;
}

.sponsorGrid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.sponsorGrid img{
width:160px;
border-radius:10px;
transition:.3s;
cursor:pointer;
}

.sponsorGrid img:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff0000;
}

/* APP */

.app{
background:#000;
padding:50px 20px;
}

.app a{
background:#00cc66;
padding:15px 30px;
border-radius:40px;
text-decoration:none;
color:white;
font-size:16px;
box-shadow:0 0 20px #00cc66;
}

/* FOOTER */

footer{
background:#111;
padding:20px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<header>
<img src="https://image2url.com/r2/default/images/1773073582797-5c7bb2aa-125b-466e-8fe1-13def1cfa011.png" class="logoText">
</header>

<section class="hero">

<div class="player">

<img src="https://image2url.com/r2/default/images/1773073454712-7beae05c-bba6-4cbc-a169-e794356cf998.png" class="logo" id="logo">

<h1>MARCONY RADIO</h1>

<div class="status" id="status">Radio detenida</div>

<audio id="radio"></audio>

<button class="playBtn" id="btn" onclick="toggleRadio()">▶ ESCUCHAR EN VIVO</button>

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<img id="cover" class="cover" src="https://via.placeholder.com/200">

<div class="eq" id="eq" style="display:none">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="history">
<h3>Últimas canciones</h3>
<ul id="history"></ul>
</div>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

</div>

</section>

<section class="sponsors">

<h2>AUSPICIADORES</h2>

<div class="sponsorGrid">

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

</div>

</section>

<section class="app">

<h2>Descarga nuestra App</h2>

<br>

<a href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
DESCARGAR APP ANDROID
</a>

</section>

<footer>

© 2026 Marcony Radio - Todos los derechos reservados  
Diseño profesional streaming radio

</footer>

<script>

const radio=document.getElementById("radio")
const btn=document.getElementById("btn")
const status=document.getElementById("status")
const logo=document.getElementById("logo")
const eq=document.getElementById("eq")

let playing=false
let history=[]

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream?"+Date.now()
radio.play()
playing=true

}else{

radio.pause()
radio.src=""
playing=false

status.innerText="Radio detenida"
btn.innerText="▶ ESCUCHAR EN VIVO"
logo.classList.remove("spin")
eq.style.display="none"

}

}

radio.addEventListener("play",()=>{

status.innerText="🔴 EN VIVO"
btn.innerText="⏹ DETENER"
logo.classList.add("spin")
eq.style.display="flex"

})

setInterval(()=>{

let song=document.getElementById("sonic_title").innerText

if(song && !history.includes(song)){

history.unshift(song)

if(history.length>5)history.pop()

let html=""
history.forEach(s=>{

html+="<li>"+s+"</li>"

})

document.getElementById("history").innerHTML=html

buscarCover(song)

}

},4000)

function buscarCover(song){

let q=encodeURIComponent(song)

fetch("https://itunes.apple.com/search?term="+q+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length>0){

document.getElementById("cover").src=data.results[0].artworkUrl100.replace("100x100","400x400")

}

})

}

</script>

</body>
</html>
