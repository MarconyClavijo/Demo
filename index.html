<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 40px;
  background:#000;
  border-bottom:1px solid #222;
  position:relative;
  z-index:10;
}

.header-logo{
  height:65px;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.8));
}

.appbtn{
  border:1px solid white;
  padding:10px 18px;
  border-radius:6px;
  text-decoration:none;
  color:white;
  font-size:14px;
  text-align:center;
  line-height:1.2;
  transition:.3s;
}

.appbtn:hover{
  background:white;
  color:black;
}

/* HERO */
.hero{
  background: linear-gradient(to right, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.3) 70%),
              url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4") center/cover no-repeat;
  height:360px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PLAYER */
.player{
  background:rgba(0,0,0,0.75);
  padding:20px 25px;
  border-radius:20px;
  text-align:center;
  width:95%;
  max-width:500px;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

.song{
  font-size:18px;
  color:white;
  text-shadow:1px 1px 5px rgba(0,0,0,0.7);
  flex:1;
}

.cover{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.play{
  width:55px;
  height:55px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:24px;
  cursor:pointer;
  flex-shrink:0;
}

.volume{
  margin-top:10px;
  width:100%;
}

/* AUSPICIADORES */
.sponsor{
  text-align:center;
  padding:25px 15px;
  background:#f9f9f9;
  color:black;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  margin:30px auto;
  max-width:95%;
}

.carousel{
  overflow:hidden;
  margin:0 auto;
}

.track{
  display:flex;
  gap:40px;
  animation:scroll 20s linear infinite;
  align-items:center;
}

.track img{
  width:140px;
  height:auto;
  border-radius:10px;
}

/* REDES */
.redes{
  text-align:center;
  padding:35px;
  background:#020202;
}

.redes a{
  display:inline-block;
  margin:6px;
  padding:10px 18px;
  border-radius:25px;
  color:white;
  text-decoration:none;
}

.fb{background:#1877f2}
.wa{background:#25d366}

/* VISITAS */
.visitas{
  text-align:center;
  padding:30px;
}

.history{
  text-align:center;
  padding:30px;
}

.history ul{
  list-style:none;
  padding:0;
}

.history li{
  margin-bottom:5px;
  font-size:14px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
  opacity:.8;
}

/* ANIMACIONES */
@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* MOBILE */
@media(max-width:700px){
  header{
    padding:12px 20px;
  }
  .header-logo{
    height:55px;
  }
  .hero{
    height:280px;
  }
  .player{
    flex-direction:column;
    padding:20px;
    gap:15px;
  }
  .cover{
    width:150px;
    height:150px;
  }
  .song{
    font-size:16px;
    text-align:center;
  }
  .sponsor{
    padding:15px 10px;
  }
  .carousel{
    overflow-x:auto;
  }
  .track{
    animation:none;
    gap:25px;
  }
  .track img{
    width:100px;
  }
}
</style>
</head>

<body>

<header>
  <img class="header-logo" src="https://image2url.com/r2/default/images/1773037946056-a151a866-7199-4082-8a26-038f5e9ca31c.png">
  <a class="appbtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
    Descarga nuestra<br>APP
  </a>
</header>

<section class="hero">
  <div class="player">
    <img id="cover" class="cover" src="https://i.imgur.com/8Km9tLL.png">
    <div class="song">
      🎵 <span id="sonic_title">Cargando canción...</span>
    </div>
    <button class="play" onclick="toggleRadio()" id="btn">▶</button>
    <input type="range" min="0" max="1" step="0.01" class="volume" onchange="radio.volume=this.value">
  </div>
</section>

<section class="sponsor">
  <h2>Auspiciado por:</h2>
  <div class="carousel">
    <div class="track">
      <a href="https://www.facebook.com/eltiojhony" target="_blank">
        <img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
      </a>
      <a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
        <img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
      </a>
    </div>
  </div>
</section>

<section class="redes">
  <h2>Síguenos</h2>
  <a class="fb" href="https://www.facebook.com/radiomarcony">Facebook</a>
  <a class="wa" href="https://wa.me/51942883375">WhatsApp</a>
</section>

<section class="visitas">
  <h2>Número de visitas</h2>
  <img src="https://hitwebcounter.com/counter/counter.php?page=18947533&style=0006&nbdigits=6&type=page&initCount=0">
</section>

<section class="history">
  <h3>Últimas canciones</h3>
  <ul id="history_list"></ul>
</section>

<footer>Marcony Radio © 2026</footer>

<audio id="radio"></audio>
<script src="https://radiostreaming.pro/cp/widgets.js?r=846" id="sonic_js" data-port="8216"></script>

<script>
const radio=document.getElementById("radio")
const title=document.getElementById("sonic_title")
const cover=document.getElementById("cover")
const historyList=document.getElementById("history_list")
let playing=false
let history=[]

function toggleRadio(){
  if(!playing){
    radio.src="https://radiostreaming.pro/8216/stream"
    radio.play()
    playing=true
    document.getElementById("btn").innerHTML="⏹"
  } else {
    radio.pause()
    radio.src=""
    playing=false
    document.getElementById("btn").innerHTML="▶"
  }
}

// Función para actualizar título y cover con widget Sonic
function updateSonic(){
  if(window.Sonic){
    Sonic.on('songChange', function(data){
      title.textContent = data.song.title || 'Sin título'
      cover.src = data.song.cover || 'https://i.imgur.com/8Km9tLL.png'

      // historial últimas 5 canciones
      history.unshift(data.song.title)
      if(history.length>5) history.pop()
      historyList.innerHTML = ''
      history.forEach(song => {
        const li = document.createElement('li')
        li.textContent = song
        historyList.appendChild(li)
      })
    })
  } else {
    setTimeout(updateSonic, 1000)
  }
}
updateSonic()
</script>

</body>
</html>
