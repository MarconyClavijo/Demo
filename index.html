<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Orbitron;
background:#000;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;

}

.logo{
font-size:22px;

}

.menu a{

}

.hero{

}

/* PARLANTES */

.speaker{
position:absolute;

transform:translateY(-50%);
width:180px;
opacity:0.9;
}

.speaker.left{
left:40px;
}

.speaker.right{
right:40px;
}

/* PLAYER */

.player{
background:rgba(0,0,0,0.75);
padding:35px;
border-radius:10px;
text-align:center;
width:90%;
max-width:520px;
}

.player img{
width:140px;
border-radius:50%;
margin-bottom:15px;
}

.song{
font-size:20px;
margin-bottom:20px;
}

.play{
width:80px;
height:80px;
border-radius:50%;
border:none;
background:white;
font-size:30px;
cursor:pointer;
}

.volume{
margin-top:20px;
width:100%;
}

/* VISITAS */

.visitas{
text-align:center;
padding:40px;
background:#020202;
}

/* REDES */

.redes{
text-align:center;
padding:30px;
}

.redes a{
display:inline-block;

}

.fb{background:#1877f2}

.sponsor-grid img{

}

.sponsor-grid img:hover{

}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
opacity:.7;
}

</style>
</head>

<body>

<header>

<div class="logo">MARCONY RADIO</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Contacto</a>
</div>

<a class="appbtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
Descarga nuestra APP
</a>

</header>

<section class="hero">

<img class="speaker left" src="https://cdn-icons-png.flaticon.com/512/1048/1048940.png">
<img class="speaker right" src="https://cdn-icons-png.flaticon.com/512/1048/1048940.png">

<div class="player">

<img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png">

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<br>

<input type="range" min="0" max="1" step="0.01" class="volume" onchange="radio.volume=this.value">

</div>

</section>

<section class="visitas">

</section>

<section class="redes">

</a>

<a class="wa" href="https://wa.me/51942883375" target="_blank">

</a>

</section>

<section class="sponsor">

<div class="sponsor-grid">

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">

</a>

</div>

</section>

<footer>

Marcony Radio © 2026

</footer>

<audio id="radio"></audio>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<script>

const radio=document.getElementById("radio")

let playing=false

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream"

radio.play()

playing=true

document.getElementById("btn").innerHTML="⏹"

}else{

radio.pause()

radio.src=""

playing=false

document.getElementById("btn").innerHTML="▶"

}

}

</script>

</body>
</html>
