<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Stereo M 101.5 FM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(180deg,#0b2a4a,#e60000);
color:white;
text-align:center;
}

/* HEADER */

header{
background:#ffd700;
color:#111;
padding:20px;
}

.logo{
width:110px;
animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* PLAYER */

.container{
max-width:420px;
margin:auto;
padding:30px 20px;
}

.player{
background:#111;
border-radius:20px;
padding:25px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* COVER */

.cover{
width:220px;
height:220px;
margin:auto;
border-radius:15px;
background:#222;
background-size:cover;
background-position:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* SONG */

.song{
margin-top:15px;
font-weight:600;
}

/* LIVE */

.live{
color:red;
font-weight:bold;
margin-top:10px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

/* BUTTON */

button{
margin-top:20px;
background:#e60000;
border:none;
color:white;
padding:15px 30px;
font-size:18px;
border-radius:30px;
cursor:pointer;
font-weight:700;
}

/* EQUALIZER */

.equalizer{
display:flex;
justify-content:center;
gap:4px;
margin-top:15px;
}

.bar{
width:5px;
height:20px;
background:#00ff90;
animation:equalize 1s infinite;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes equalize{
0%{height:5px}
50%{height:25px}
100%{height:5px}
}

/* LINKS */

.links{
margin-top:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.links a{
background:white;
color:#e60000;
padding:12px;
border-radius:25px;
text-decoration:none;
font-weight:600;
}

/* FOOTER */

footer{
margin-top:30px;
background:#222;
padding:15px;
font-size:14px;
}

</style>
</head>

<body>

<header>

<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png" class="logo">

<h2>Radio Stereo M 101.5 FM</h2>
<div>La Radio Papá 🎙️</div>

</header>

<div class="container">

<div class="player">

<div id="cover" class="cover"></div>

<div class="live">🔴 EN VIVO</div>

<div class="song">
🎵 <span id="songTitle">Cargando canción...</span>
</div>

<div class="equalizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<button id="playBtn">ESCUCHAR EN VIVO</button>

<audio id="radio" playsinline preload="none"></audio>

</div>

<div class="links">

<a href="https://play.google.com/store/apps/details?id=com.innovatel.radiostereom" target="_blank">📲 Descargar App</a>

<a href="https://www.facebook.com/share/1Dib9eQUFD/" target="_blank">📘 Facebook</a>

<a href="https://wa.me/51984412853" target="_blank">🎤 WhatsApp Oyentes</a>

<a href="https://wa.me/51942883375" target="_blank">📢 Publicidad</a>

</div>

</div>

<footer>
Diseño web Marcony Clavijo | 942883375
</footer>

<script>

const btn=document.getElementById("playBtn");
const radio=document.getElementById("radio");

let playing=false;

const stream="https://sonic.globalstream.pro/8108/stream";

btn.onclick=function(){

if(!playing){

radio.src=stream+"?t="+Date.now();
radio.play();

btn.innerText="DETENER";
playing=true;

}else{

radio.pause();
radio.src="";
btn.innerText="ESCUCHAR EN VIVO";
playing=false;

}

};

</script>

<!-- SONIC TITULO -->

<script id="sonic_js" data-port="8108" src="https://sonic.globalstream.pro/cp/widgets.js?r=906"></script>

<script>

function updateSong(){

if(typeof sonic_data!=="undefined"){

if(sonic_data.songtitle){

let song=sonic_data.songtitle;

document.getElementById("songTitle").innerText=song;

loadCover(song);

}

}

}

setInterval(updateSong,3000);

function loadCover(song){

let url="https://itunes.apple.com/search?term="+encodeURIComponent(song)+"&limit=1";

fetch(url)
.then(r=>r.json())
.then(data=>{

if(data.results.length>0){

let cover=data.results[0].artworkUrl100.replace("100x100","500x500");

document.getElementById("cover").style.backgroundImage="url("+cover+")";

}

});

}

</script>

</body>
</html>
