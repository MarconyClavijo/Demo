<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corporación Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f2f2f2;
text-align:center;
transition:.3s;
}

/* HEADER */
.header{
padding:20px;
}

.header img{
width:320px;
max-width:90%;
animation:float 4s ease-in-out infinite;
filter:drop-shadow(0 0 20px rgba(255,120,0,.5));
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* BOTON DARK */
#darkBtn{
padding:10px 18px;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
background:#111;
color:#fff;
}

/* GRID */
.radios{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

@media(min-width:768px){
.radios{grid-template-columns:repeat(3,1fr);}
}

/* CARD */
.radio{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.15);
transition:.3s;
cursor:pointer;
}

.radio:hover{
transform:scale(1.05);
}

.radio-top{
height:130px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.radio-top img{
width:80px;
}

/* PLAY */
.play{
position:absolute;
bottom:-25px;
background:linear-gradient(45deg,#ff00cc,#6a00ff);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
}

/* NAME */
.radio-name{
padding:35px 10px 15px;
font-weight:600;
}

/* ACTIVE */
.active{
box-shadow:0 0 25px #ff0000;
transform:scale(1.05);
}

/* PLAYER */
.player{
margin:25px;
}

audio{
width:300px;
}

/* ADS */
.ads{
margin:40px auto;
max-width:600px;
background:linear-gradient(90deg,#ff0000,#ff7300);
padding:25px;
border-radius:20px;
color:white;
}

/* FOOTER */
footer{
margin-top:20px;
padding:15px;
font-size:13px;
opacity:.7;
}

/* MINI PLAYER */
#miniPlayer{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#111;
color:#fff;
padding:12px;
border-radius:15px;
z-index:9999;
display:flex;
justify-content:center;
font-weight:600;
}

/* DARK MODE */
.dark{
background:#121212;
color:white;
}

.dark .radio{
background:#1f1f1f;
}

.dark .ads{
background:linear-gradient(90deg,#222,#444);
}

/* ===== SPLASH PRO ===== */
.splash{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff0000,#ff7300,#111);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:99999;
animation:hideSplash 3s ease forwards;
}

.splash-logo{
width:200px;
height:200px;
border-radius:30px;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 50px rgba(0,0,0,.35);
}

.splash-logo img{
width:160px;
max-width:80%;
animation:floatLogo 2s ease-in-out infinite;
}

.splash-text{
margin-top:18px;
color:white;
font-weight:700;
font-size:22px;
letter-spacing:1px;
}

@keyframes logoIn{
0%{transform:scale(0.3);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes floatLogo{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

@keyframes hideSplash{
0%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

</style>

</head>

<body>

<div class="splash">
  <div class="splash-logo">
    <img src="https://imgfz.com/i/eR5Xw2K.png">
  </div>
  <div class="splash-text">Corporación Marcony</div>
</div>
<!-- HEADER -->
<div class="header">
<img src="https://imgfz.com/i/eR5Xw2K.png">
<br>
<button id="darkBtn">🌙 Modo Oscuro</button>
</div>

<!-- RADIOS -->
<div class="radios">

<div class="radio" id="r1"
onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','r1')">
<div class="radio-top" style="background:#ffd400">
<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">
<div class="play">▶</div>
</div>
<div class="radio-name">Stereo M</div>
</div>

<div class="radio" id="r2"
onclick="playRadio('https://radiostreaming.pro/8310/stream','Radio La Patrona','r2')">
<div class="radio-top" style="background:#ff2e8a">
<img src="https://image2url.com/r2/default/images/1773782144520-db83b536-4765-45ec-b761-f51c5ee811ed.png">
<div class="play">▶</div>
</div>
<div class="radio-name">Radio La Patrona</div>
</div>

<div class="radio" id="r3"
onclick="playRadio('https://radiostreaming.pro/8238/stream','La Tremenda','r3')">
<div class="radio-top" style="background:#ff3d00">
<img src="https://imgfz.com/i/h7TrEm5.png">
<div class="play">▶</div>
</div>
<div class="radio-name">La Tremenda</div>
</div>

<div class="radio" id="r4"
onclick="playRadio('https://radiostreaming.pro/8234/stream','Stereo L','r4')">
<div class="radio-top" style="background:#0f8f73">
<img src="https://imgfz.com/i/pFgX2fl.png">
<div class="play">▶</div>
</div>
<div class="radio-name">Stereo L</div>
</div>

</div>

<!-- PLAYER -->
<div class="player">
<h3 id="radioTitle">Selecciona una radio</h3>
<audio id="player" controls></audio>
</div>

<!-- ADS -->
<div class="ads">
<h3>📢 Publicidad en nuestras radios</h3>
<p>Promociona tu negocio en Corporación Marcony</p>
<a href="https://wa.me/51942883375" target="_blank" style="color:white;">💬 WhatsApp</a>
</div>

<footer>
© 2026 Corporación Marcony
</footer>

<!-- MINI PLAYER -->
<div id="miniPlayer">
🎧 <span id="miniRadio">Ninguna radio seleccionada</span>
</div>

<script>

const player = document.getElementById("player");
const title = document.getElementById("radioTitle");

let currentRadio = null;
let playing = false;

/* RADIO */
function playRadio(url,name,id){

const btn = document.querySelector("#"+id+" .play");

if(playing && currentRadio === id){
player.pause();
player.src = "";
player.load();
title.innerText = "Radio detenida";
document.getElementById(id).classList.remove("active");
btn.innerHTML = "▶";
playing = false;
currentRadio = null;
document.getElementById("miniRadio").innerText = "Ninguna radio seleccionada";
return;
}

player.pause();
player.src = url;
player.load();

player.play().catch(err=>{
console.log("Error audio:", err);
});

title.innerText = "🔴 EN VIVO: " + name;
document.getElementById("miniRadio").innerText = name;
document.title = "🔴 " + name + " en Vivo";

document.querySelectorAll(".radio").forEach(r=>{
r.classList.remove("active");
});

document.querySelectorAll(".play").forEach(b=>{
b.innerHTML = "▶";
});

document.getElementById(id).classList.add("active");
btn.innerHTML = "⏹";

currentRadio = id;
playing = true;
}

/* DARK MODE */
const darkBtn = document.getElementById("darkBtn");

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

darkBtn.onclick = () => {
document.body.classList.toggle("dark");

localStorage.setItem(
"theme",
document.body.classList.contains("dark") ? "dark" : "light"
);
};

/* PWA */
if('serviceWorker' in navigator){
window.addEventListener("load", () => {
navigator.serviceWorker.register('./sw.js')
.catch(err => console.log("SW error", err));
});
}

</script>

</body>
</html>
