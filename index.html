<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:#000;
border-bottom:1px solid #222;
}

.header-left{
display:flex;
align-items:center;
gap:20px;
}

.header-logo{
height:70px;
filter:drop-shadow(0 5px 10px rgba(0,0,0,0.9));
}

/* BOTON APP */

.appbtn{
border:1px solid white;
padding:10px 18px;
border-radius:6px;
text-decoration:none;
color:white;
font-family:'Poppins',sans-serif;
font-size:14px;
text-align:center;
line-height:1.2;
}

.appbtn:hover{
background:white;
color:black;
}

/* HERO */

.hero{
background:url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4") center/cover no-repeat;
min-height:480px;
display:flex;
align-items:center;
justify-content:center;
}

/* PLAYER */

.player{
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:14px;
text-align:center;
width:90%;
max-width:520px;
}

/* SONG */

.song{
font-size:18px;
margin-bottom:10px;
}

/* COVER */

.cover{
width:220px;
height:220px;
object-fit:cover;
border-radius:10px;
margin:15px auto;
display:block;
}

/* PLAY */

.play{
width:70px;
height:70px;
border-radius:50%;
border:none;
background:white;
font-size:28px;
cursor:pointer;
}

.volume{
margin-top:20px;
width:100%;
}

/* AUSPICIADO */

.sponsor{
text-align:center;
padding:40px 20px;
background:#ffffff;
color:#000;
margin-top:30px;
}

.sponsor h2{
margin-bottom:25px;
}

/* CARRUSEL */

.carousel{
overflow:hidden;
width:100%;
}

.track{
display:flex;
gap:80px;
animation:scroll 18s linear infinite;
align-items:center;
}

.track img{
width:170px;
filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2));
transition:.3s;
}

.track img:hover{
transform:scale(1.05);
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* VISITAS */

.visitas{
text-align:center;
padding:40px;
background:#020202;
}

/* HISTORIAL */

.history{
text-align:center;
padding:30px;
}

.history ul{
list-style:none;
padding:0;
}

.history li{
margin:6px 0;
opacity:.8;
}

/* REDES */

.redes{
text-align:center;
padding:30px;
}

.redes a{
display:inline-block;
margin:5px;
padding:10px 18px;
border-radius:25px;
color:white;
text-decoration:none;
font-family:'Poppins',sans-serif;
}

.fb{background:#1877f2}
.wa{background:#25d366}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
opacity:.7;
}

/* MOBILE */

@media(max-width:600px){

header{
flex-direction:column;
gap:10px;
}

.header-left{
flex-direction:column;
}

.header-logo{
height:65px;
}

}

</style>
</head>

<body>

<header>

<div class="header-left">

<img class="header-logo" src="https://image2url.com/r2/default/images/1773037946056-a151a866-7199-4082-8a26-038f5e9ca31c.png">

<a class="appbtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
Descarga nuestra<br>APP
</a>

</div>

</header>

<section class="hero">

<div class="player">

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<img id="cover" class="cover" src="https://i.imgur.com/8Km9tLL.png">

<button class="play" onclick="toggleRadio()" id="btn">▶</button>

<br>

<input type="range" min="0" max="1" step="0.01" class="volume" onchange="radio.volume=this.value">

</div>

</section>

<section class="sponsor">

<h2>Auspiciado por:</h2>

<div class="carousel">

<div class="track">

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

</div>

</div>

</section>

<section class="visitas">

<h2>Número de visitas</h2>

<img src="https://hitwebcounter.com/counter/counter.php?page=18947533&style=0006&nbdigits=6&type=page&initCount=0">

</section>

<section class="history">

<h3>Últimas canciones</h3>

<ul id="history"></ul>

</section>

<section class="redes">

<h2>Síguenos</h2>

<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">Facebook</a>

<a class="wa" href="https://wa.me/51942883375" target="_blank">WhatsApp</a>

</section>

<footer>
Marcony Radio © 2026
</footer>

<audio id="radio"></audio>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<script>

const radio=document.getElementById("radio")

let playing=false

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream"
radio.play()
playing=true
document.getElementById("btn").innerHTML="⏹"

}else{

radio.pause()
radio.src=""
playing=false
document.getElementById("btn").innerHTML="▶"

}

}

</script>

</body>
</html>
