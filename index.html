<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MarconyRadio.com</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#000,#111,#000);
color:white;
text-align:center;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:#000;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:1px;
}

.logo span{
color:#ff2a2a;
}

.btn-app{
background:#ff2a2a;
padding:8px 16px;
border-radius:20px;
color:white;
text-decoration:none;
font-size:13px;
font-weight:bold;
}

/* PLAYER */

.player{
background:#111;
margin:25px;
padding:25px;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.cover{
width:120px;
border-radius:12px;
}

.live{
color:#00ff84;
font-weight:bold;
margin-top:10px;
}

.song{
color:#ffd34d;
margin:10px 0;
font-size:14px;
}

/* BUTTON */

button{
background:white;
border:none;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* VOLUME */

.volume{
margin-top:10px;
}

/* VISUALIZER */

.visualizer{
display:flex;
justify-content:center;
gap:5px;
margin-top:15px;
}

.bar{
width:4px;
height:12px;
background:#00eaff;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes wave{
0%{height:10px}
50%{height:32px}
100%{height:10px}
}

/* VISITAS */

.visitas{
margin-top:15px;
font-size:13px;
color:#bbb;
}

/* SOCIAL */

.social{
margin-top:18px;
}

.social a{
margin:0 10px;
color:#00eaff;
text-decoration:none;
font-size:14px;
}

/* SECTION */

.section{
margin:35px 20px;
}

.songlist{
background:#111;
padding:15px;
border-radius:10px;
font-size:14px;
line-height:22px;
}

/* SPONSORS */

.sponsors{
margin-top:20px;
}

.sponsors img{
width:140px;
margin:15px;
}

/* FOOTER */

footer{
margin-top:30px;
padding:12px;
background:#000;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<header>

<div class="logo">
MARCONY<span>RADIO</span>.COM
</div>

<a href="#" class="btn-app">DESCARGAR APP</a>

</header>

<div class="player">

<img src="https://i.imgur.com/8Km9tLL.png" class="cover">

<div class="live">● EN VIVO</div>

<div class="song">
Marcony Radio Live Stream
</div>

<audio id="radio" src="https://stream.zeno.fm/r4mpcrfwfzzuv" preload="none"></audio>

<br><br>

<button onclick="toggleRadio()">PLAY / PAUSA</button>

<div class="volume">
<input type="range" min="0" max="1" step="0.1" value="0.7"
oninput="setVolume(this.value)">
</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="visitas">

👥 Visitantes<br
