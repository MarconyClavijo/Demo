<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
border-bottom:1px solid #222;
}

.logo{
font-size:24px;
font-weight:bold;
}

.menu a{
margin:0 15px;
color:white;
text-decoration:none;
}

.appbtn{
border:1px solid white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
color:white;
}

/* HERO */

.hero{
background:url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4") center/cover no-repeat;
height:480px;
display:flex;
align-items:center;
justify-content:center;
}

/* PLAYER */

.player{
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:12px;
text-align:center;
width:90%;
max-width:520px;
}

/* LOGO RADIO */

.logo-radio{
width:200px;
margin-bottom:15px;
}

/* SONG */

.song{
font-size:18px;
margin-bottom:10px;
}

/* COVER */

.cover{
width:220px;
height:220px;
object-fit:cover;
border-radius:10px;
margin:15px auto;
display:block;
}

/* PLAY */

.play{
width:70px;
height:70px;
border-radius:50%;
border:none;
background:white;
font-size:28px;
cursor:pointer;
}

.volume{
margin-top:20px;
width:100%;
}

/* HISTORIAL */

.history{
text-align:center;
padding:30px;
}

.history ul{
list-style:none;
padding:0;
}

.history li{
margin:6px 0;
opacity:.8;
}

/* VISITAS */

.visitas{
text-align:center;
padding:40px;
background:#020202;
}

/* REDES */

.redes{
text-align:center;
padding:30px;
}

.redes a{
display:inline-block;
margin:5px;
padding:10px 18px;
border-radius:25px;
color:white;
text-decoration:none;
}

.fb{background:#1877f2}
.wa{background:#25d366}

/* AUSPICIADORES */

.sponsor{
text-align:center;
padding:50px;
background:#ffffff;
color:#000;
}

.carousel{
display:flex;
justify-content:center;
align-items:center;
gap:80px;
animation:slide 12s infinite linear;
}

.carousel img{
width:190px;
transition:0.3s;
}

.carousel img:hover{
transform:scale(1.08);
}

@keyframes slide{

0%{transform:translateX(0)}

50%{transform:translateX(-40px)}

100%{transform:translateX(0)}

}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
opacity:.7;
}

</style>
</head>

<body>

<header>

<div class="logo">MARCONY RADIO</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Contacto</a>
</div>

<a class="appbtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
Descarga nuestra APP
</a>

</header>

<section class="hero">

<div class="player">

<img class="logo-radio" src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png">

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<img id="cover" class="cover" src="https://i.imgur.com/8Km9tLL.png">

<button class="play" onclick="toggleRadio()" id="btn">▶</button>

<br>

<input type="range" min="0" max="1" step="0.01" class="volume" onchange="radio.volume=this.value">

</div>

</section>

<section class="history">

<h3>Últimas canciones</h3>

<ul id="history"></ul>

</section>

<section class="visitas">

<h2>Número de visitas</h2>

<img src="https://hitwebcounter.com/counter/counter.php?page=18947533&style=0006&nbdigits=6&type=page&initCount=0">

</section>

<section class="redes">

<h2>Síguenos</h2>

<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">Facebook</a>

<a class="wa" href="https://wa.me/51942883375" target="_blank">WhatsApp</a>

</section>

<section class="sponsor">

<h2>AUSPICIADORES</h2>

<div class="carousel">

<a href="https://www.facebook.com/eltiojhony" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">
</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">
<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">
</a>

</div>

</section>

<footer>

Marcony Radio © 2026

</footer>

<audio id="radio"></audio>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<script>

const radio=document.getElementById("radio")

let playing=false

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream"

radio.play()

playing=true

document.getElementById("btn").innerHTML="⏹"

}else{

radio.pause()

radio.src=""

playing=false

document.getElementById("btn").innerHTML="▶"

}

}

/* HISTORIAL + PORTADA RAPIDA */

let history=[]

setInterval(()=>{

let song=document.getElementById("sonic_title").innerText

if(song && !history.includes(song)){

history.unshift(song)

if(history.length>5)history.pop()

let html=""

history.forEach(s=>{

html+="<li>"+s+"</li>"

})

document.getElementById("history").innerHTML=html

buscarCover(song)

}

},4000)

function buscarCover(song){

let q=encodeURIComponent(song)

fetch("https://itunes.apple.com/search?term="+q+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length>0){

document.getElementById("cover").src=data.results[0].artworkUrl100.replace("100x100","300x300")

}

})

}

</script>

</body>
</html>
