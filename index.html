<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcony Radio | En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Orbitron;
background:#000;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#000;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu a{
margin:0 10px;
color:white;
text-decoration:none;
}

.appbtn{
border:1px solid white;
padding:8px 15px;
border-radius:5px;
text-decoration:none;
color:white;
}

/* HERO PLAYER */

.hero{
background:url("https://images.unsplash.com/photo-1590608897129-79da98d15969") center/cover no-repeat;
height:420px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.player{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:10px;
width:80%;
max-width:600px;
}

.player img{
width:140px;
border-radius:50%;
margin-bottom:15px;
}

.song{
font-size:20px;
margin-bottom:20px;
}

.play{
width:80px;
height:80px;
border-radius:50%;
border:none;
background:white;
color:black;
font-size:30px;
cursor:pointer;
}

.volume{
margin-top:20px;
width:100%;
}

/* REDES */

.redes{
text-align:center;
padding:25px;
}

.redes a{
display:inline-block;
margin:5px;
padding:10px 18px;
border-radius:30px;
color:white;
text-decoration:none;
font-size:14px;
}

.fb{background:#1877f2}
.wa{background:#25d366}

/* AUSPICIADORES */

.sponsor{
text-align:center;
padding:40px;
background:#050505;
}

.sponsor h2{
margin-bottom:30px;
}

.sponsor-grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.sponsor-grid img{
width:180px;
transition:0.3s;
cursor:pointer;
border-radius:10px;
}

.sponsor-grid img:hover{
transform:scale(1.1);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
opacity:.7;
}

</style>
</head>

<body>

<header>

<div class="logo">MARCONY RADIO</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Contacto</a>
</div>

<a class="appbtn" href="https://play.google.com/store/apps/details?id=com.innovatel.marconyradio" target="_blank">
Descarga nuestra APP
</a>

</header>

<section class="hero">

<div class="player">

<img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png">

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<button class="play" onclick="toggleRadio()" id="btn">
▶
</button>

<br>

<input type="range" min="0" max="1" step="0.01" class="volume" onchange="radio.volume=this.value">

</div>

</section>

<!-- REDES -->

<section class="redes">

<h2>Síguenos</h2>

<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">
Facebook
</a>

<a class="wa" href="https://wa.me/51942883375" target="_blank">
WhatsApp
</a>

</section>

<!-- AUSPICIADORES -->

<section class="sponsor">

<h2>AUSPICIADORES</h2>

<div class="sponsor-grid">

<a href="https://www.facebook.com/eltiojhony" target="_blank">

<img src="https://image2url.com/r2/default/images/1773033863184-0f8f4472-23e2-499a-9ee2-09855499b657.png">

</a>

<a href="https://www.facebook.com/iepchildrenscollege" target="_blank">

<img src="https://image2url.com/r2/default/images/1773033971607-e63d7b01-4951-4025-9317-a1a96877113d.png">

</a>

</div>

</section>

<footer>

Marcony Radio © 2026

</footer>

<audio id="radio"></audio>

<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<script>

const radio=document.getElementById("radio")

let playing=false

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream"

radio.play()

playing=true

document.getElementById("btn").innerHTML="⏹"

}

else{

radio.pause()

radio.src=""

playing=false

document.getElementById("btn").innerHTML="▶"

}

}

</script>

</body>
</html>
